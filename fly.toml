# fly.toml file generated for kom-mono on 2022-11-03T22:52:27-04:00

app = "kom-mono"
primary_region = "ewr"

[env]
  HOST = "0.0.0.0"
  LOG_JSON = "true"
  LOG_LEVEL = "mono=info,tracing=info,axum=info"
  PORT = "3000"
  START_DATE = "2021-10-07T00:00:00Z"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  [http_service.concurrency]
    soft_limit = 100
    type = "requests"

[[vm]]
  size = "shared-cpu-1x"

[checks]
  [checks.status]
    type = "http"
    grace_period = "5s"
    interval = "60s"
    method = "get"
    path = "/status"
    timeout = "2s"
    port = 3000
