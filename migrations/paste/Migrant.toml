
# Required, do not edit
database_type = "postgres"

# Required database info
database_name = "env:PASTE_DB_NAME"
database_user = "env:PASTE_DB_USER"
database_password = "env:PASTE_DB_PASS"

# Configurable database info
database_host = "env:PASTE_DB_HOST"         # default "localhost"
database_port = "env:PASTE_DB_PORT"          # default "5432"
migration_location = "migrations"  # default "migrations"

